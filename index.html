<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>r/IndianRailways — Subscribers</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<style>
:root{
  --bg:#0f1113;
  --panel:#111214;
  --muted:#bbb;
  --accent:#4CAF50;
  --card-radius:12px;
  --pad:16px;
}
body{
  margin:0;
  font-family:Inter,Arial,Helvetica,sans-serif;
  background:linear-gradient(180deg,#0b0b0d 0%,#121214 100%);
  color:#fff;
  padding:20px;
}
.container{ max-width:980px; margin:0 auto; }
header { text-align:center; margin-bottom:8px; }
h1 { margin:6px 0; font-size:1.6rem; font-weight:600; }
#count { font-size:3.8rem; font-weight:800; color:var(--accent); }
.card {
  background: rgba(255,255,255,0.02);
  border-radius:var(--card-radius);
  padding:var(--pad);
  margin:12px 0;
  box-shadow:0 6px 18px rgba(0,0,0,0.45);
}
.stats { display:flex; gap:12px; flex-wrap:wrap; justify-content:center; }
.stat {
  min-width:180px;
  background:rgba(255,255,255,0.02);
  padding:12px;
  border-radius:10px;
  text-align:center;
}
.stat .val { font-size:1.25rem; font-weight:700; color:var(--accent); }

.tabs { display:flex; gap:8px; justify-content:center; margin-top:18px; flex-wrap:wrap; }
.tab-btn { background:#222; color:#ddd; border-radius:8px; padding:8px 12px; border:none; cursor:pointer; }
.tab-btn.active { background:var(--accent); color:#021805; font-weight:700; }

.chart-container { height: 300px; }

.proj-highlight{
  border:2px solid #4CAF50;
  box-shadow:0 0 12px rgba(76,175,80,0.5);
}
</style>
</head>
<body>
<div class="container">

<header>
  <h1>r/IndianRailways Subscribers</h1>
  <div id="count">—</div>
</header>

<button onclick="updateSubs()">Update Now</button>

<div class="card">
<div class="stats">
  <div class="stat"><b>Growth Today</b><div class="val" id="dailyGrowth"></div></div>
  <div class="stat"><b>Growth Week</b><div class="val" id="weeklyGrowth"></div></div>
  <div class="stat"><b>Growth Month</b><div class="val" id="monthlyGrowth"></div></div>
  <div class="stat"><b>Growth Year</b><div class="val" id="yearlyGrowth"></div></div>
</div>
<div id="lastUpdated"></div>
</div>

<div class="card">
<div class="tabs">
  <button class="tab-btn" data-range="24h">24 Hours</button>
  <button class="tab-btn" data-range="7d">7 Days</button>
  <button class="tab-btn" data-range="30d">30 Days</button>
  <button class="tab-btn active" data-range="12m">12 Months</button>
  <button class="tab-btn" data-range="proj">Projections</button>
</div>

<div class="chart-container">
  <canvas id="growthChart"></canvas>
</div>
</div>

<div class="card" id="projectionCard" style="display:none;">
  <div style="text-align:center"><b>Growth Projections</b></div>
  <div id="projectionList"></div>
</div>

</div>

<script>
const DAY_MS = 86400000;
let logs = [];
let currentRange='12m';

function format(n){ return new Intl.NumberFormat('en-IN').format(n); }

function getLatest(){ return logs[logs.length-1]; }

/* ===== FIXED REGRESSION ===== */
function linearRegression(data){
  const t0 = data[0].time;
  let sumX=0,sumY=0,sumXY=0,sumXX=0;

  data.forEach(p=>{
    const x=(p.time - t0)/DAY_MS;
    const y=p.count;
    sumX+=x; sumY+=y; sumXY+=x*y; sumXX+=x*x;
  });

  const n=data.length;
  const slope=(n*sumXY - sumX*sumY)/(n*sumXX - sumX*sumX);
  return {slope};
}

/* ===== PROJECTIONS ===== */
function renderProjections(){
  const latest=getLatest().count;
  const now=Date.now();

  const data=logs.slice(-200);
  const {slope}=linearRegression(data);

  const milestones=[];
  const next10k=Math.ceil(latest/10000)*10000;
  for(let i=0;i<6;i++) milestones.push(next10k+i*10000);

  let html=`<div style="display:flex;flex-wrap:wrap;gap:12px;justify-content:center;">`;

  milestones.forEach((m,i)=>{
    if(m<=latest) return;

    const days=(m-latest)/slope;
    const date=new Date(now+days*DAY_MS);

    html+=`
    <div class="${i===0?'proj-highlight':''}" style="
      min-width:180px;
      padding:14px;
      border-radius:10px;
      background:rgba(255,255,255,0.02);
      text-align:center;">
      
      <div style="font-size:1.4rem;font-weight:800">${format(m)}</div>
      <div style="color:#4CAF50;font-weight:700;margin-top:6px">
        ${date.toLocaleDateString('en-IN')}
      </div>
      <div style="color:#aaa;font-size:0.85rem">
        ~${days.toFixed(1)} days
      </div>

    </div>`;
  });

  html+=`</div>`;
  document.getElementById('projectionList').innerHTML=html;
}

/* ===== DUMMY DATA (unchanged behavior) ===== */
function generate(){
  const now=Date.now();
  let count=350000;
  for(let i=0;i<365;i++){
    logs.push({time:now-i*DAY_MS,count:count});
    count-=200;
  }
  logs.reverse();
}

/* ===== UI ===== */
function updateSubs(){
  const latest=getLatest().count;
  document.getElementById('count').textContent=format(latest);

  if(currentRange==='proj') renderProjections();
}

document.querySelectorAll('.tab-btn').forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    currentRange=b.dataset.range;

    if(currentRange==='proj'){
      document.querySelector('.chart-container').style.display='none';
      document.getElementById('projectionCard').style.display='block';
      renderProjections();
    }else{
      document.querySelector('.chart-container').style.display='block';
      document.getElementById('projectionCard').style.display='none';
    }
  }
});

generate();
updateSubs();
</script>
</body>
</html>
